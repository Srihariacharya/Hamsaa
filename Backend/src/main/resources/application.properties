spring.application.name=contactpro

# Database Configuration (H2 for Testing)
spring.datasource.url=jdbc:h2:file:./data/contactpro;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/integrations/google/callback}
google.scope=openid email profile https://www.googleapis.com/auth/contacts.readonly