# Hamsaa Production Build v1.2.0 (Analytics + Gender + Performance Fixes)
spring.application.name=contactpro

# Database Configuration (H2 for Testing)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/contactpro;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/integrations/google/callback}
google.scope=openid email profile https://www.googleapis.com/auth/contacts.readonly